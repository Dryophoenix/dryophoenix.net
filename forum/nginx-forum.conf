# /etc/nginx/sites-available/forum.dryophoenix.net
#
# BEFORE enabling:
#   1. Add the rate-limit zone to /etc/nginx/nginx.conf inside the http { } block:
#
#        limit_req_zone $binary_remote_addr zone=forum_submit:10m rate=5r/m;
#        limit_req_zone $binary_remote_addr zone=forum_global:10m rate=30r/m;
#
#   2. Obtain a certificate:
#        sudo certbot certonly --nginx -d forum.dryophoenix.net
#
#   3. Symlink and reload:
#        sudo ln -s /etc/nginx/sites-available/forum.dryophoenix.net \
#                   /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

# ── Redirect bare HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name forum.dryophoenix.net;

    # Allow Let's Encrypt ACME challenge through before cert exists
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server block ─────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name forum.dryophoenix.net;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/forum.dryophoenix.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forum.dryophoenix.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/forum.access.log;
    error_log  /var/log/nginx/forum.error.log warn;

    # ── Static files ──────────────────────────────────────────────────────────
    root  /var/www/forum.dryophoenix.net;
    index index.html;

    # ── Global rate limit — applied to the whole subdomain ───────────────────
    limit_req zone=forum_global burst=20 nodelay;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy
        "default-src 'self';
         style-src   'self' https://cdn.jsdelivr.net;
         img-src     'self';
         font-src    'self' https://cdn.jsdelivr.net;
         script-src  'none';
         frame-ancestors 'none';
         form-action 'self';"
        always;

    # ── Hide nginx version and server header ──────────────────────────────────
    # (also set server_tokens off in nginx.conf http block)
    more_clear_headers Server;   # requires nginx-extras; remove if not installed

    # ── Limit request size — a name+email form needs almost nothing ───────────
    client_max_body_size 4k;

    # ── Block common scanner paths ────────────────────────────────────────────
    location ~* ^/(wp-admin|wp-login|\.env|\.git|phpinfo|admin|config) {
        return 404;
    }

    # ── Deny access to data file (submissions.jsonl) ──────────────────────────
    location ~* \.jsonl$ {
        deny all;
        return 404;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;

        # Cache static files aggressively; HTML not cached (changes infrequently
        # but you'll want to invalidate immediately when you edit)
        location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── POST /submit — proxy to the Python handler ────────────────────────────
    location = /submit {
        # Only POST allowed; everything else gets a 405
        limit_except POST { return 405; }

        # Tighter rate limit: 5 POSTs/minute per IP, burst of 3
        limit_req zone=forum_submit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3002/submit;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Host            $host;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        # Strip the upstream's internal headers before they reach the client
        proxy_hide_header  X-Powered-By;
    }
}
