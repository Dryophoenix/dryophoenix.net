{{ define "main" }}
<article>
  <header>
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
  </header>
  <div class="content">
    {{ .Content }}
  </div>
  {{ if .Pages }}
  <section class="list-items">
    {{ range .Pages }}
    <article class="list-item">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
      {{ .Summary }}
    </article>
    {{ end }}
  </section>
  {{ end }}
</article>
{{ end }}
